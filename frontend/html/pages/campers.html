<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campers - Camp Management System</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div id="app">
        <main class="main-content" id="mainContent">
            <div class="spinner"></div>
        </main>
    </div>

    <!-- Camper Modal -->
    <div class="modal" id="camperModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Add Camper</h3>
                <button class="close-btn" onclick="CampersPage.closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="camperForm">
                    <input type="hidden" id="camperId">
                    
                    <div class="form-group">
                        <label for="firstName">First Name *</label>
                        <input type="text" id="firstName" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="lastName">Last Name *</label>
                        <input type="text" id="lastName" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="dateOfBirth">Date of Birth *</label>
                        <input type="date" id="dateOfBirth" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="gender">Gender</label>
                        <select id="gender">
                            <option value="">Select gender</option>
                            <option value="M">Male</option>
                            <option value="F">Female</option>
                            <option value="O">Other</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="groupId">Group</label>
                        <select id="groupId">
                            <option value="">Select group</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="parentIds">Parents</label>
                        <select id="parentIds" multiple>
                            <option value="">Select parents</option>
                        </select>
                        <small>Hold Ctrl/Cmd to select multiple</small>
                    </div>
                    
                    <div class="form-group">
                        <label for="notes">Notes</label>
                        <textarea id="notes" rows="3"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="CampersPage.closeModal()">Cancel</button>
                <button class="btn btn-primary" onclick="CampersPage.saveCamper()">Save</button>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        const CampersPage = {
            campers: [],
            groups: [],
            parents: [],
            
            async init() {
                if (!Auth.requireRole('admin')) return;
                
                await this.loadData();
                this.render();
            },
            
            async loadData() {
                try {
                    const [campers, groups, parents] = await Promise.all([
                        ApiService.campers.getAll(),
                        ApiService.groups.getAll(),
                        ApiService.parents.getAll()
                    ]);
                    
                    this.campers = campers;
                    this.groups = groups;
                    this.parents = parents;
                } catch (error) {
                    Toast.error('Failed to load data');
                }
            },
            
            render() {
                const content = document.getElementById('mainContent');
                if (!content) return;
                
                content.innerHTML = `
                    <div class="page-header">
                        <h2>Campers</h2>
                        <button class="btn btn-primary" onclick="CampersPage.openAddModal()">Add Camper</button>
                    </div>
                    
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Name</th>
                                    <th>Age</th>
                                    <th>Gender</th>
                                    <th>Group</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${this.campers.map(camper => `
                                    <tr>
                                        <td>${camper.first_name} ${camper.last_name}</td>
                                        <td>${camper.age || 'N/A'}</td>
                                        <td>${camper.gender || 'N/A'}</td>
                                        <td>${camper.group?.name || 'Unassigned'}</td>
                                        <td>
                                            ${camper.is_suspended ? 
                                                '<span style="color: #ef4444">Suspended</span>' : 
                                                camper.is_active ? 
                                                '<span style="color: #10b981">Active</span>' : 
                                                '<span style="color: #6b7280">Inactive</span>'}
                                        </td>
                                        <td>
                                            <div class="action-buttons">
                                                <button class="action-btn edit-btn" onclick="CampersPage.openEditModal(${camper.id})">Edit</button>
                                                <button class="action-btn view-btn" onclick="CampersPage.viewCamper(${camper.id})">View</button>
                                                ${camper.is_suspended ? 
                                                    `<button class="action-btn" style="background:#10b981" onclick="CampersPage.activateCamper(${camper.id})">Activate</button>` :
                                                    `<button class="action-btn" style="background:#f59e0b" onclick="CampersPage.suspendCamper(${camper.id})">Suspend</button>`
                                                }
                                                <button class="action-btn delete-btn" onclick="CampersPage.deleteCamper(${camper.id})">Delete</button>
                                            </div>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                `;
            },
            
            openAddModal() {
                document.getElementById('modalTitle').textContent = 'Add Camper';
                document.getElementById('camperId').value = '';
                document.getElementById('firstName').value = '';
                document.getElementById('lastName').value = '';
                document.getElementById('dateOfBirth').value = '';
                document.getElementById('gender').value = '';
                document.getElementById('groupId').value = '';
                document.getElementById('notes').value = '';
                
                this.populateSelects();
                document.getElementById('camperModal').classList.add('active');
            },
            
            async openEditModal(id) {
                try {
                    const camper = await ApiService.campers.getById(id);
                    
                    document.getElementById('modalTitle').textContent = 'Edit Camper';
                    document.getElementById('camperId').value = camper.id;
                    document.getElementById('firstName').value = camper.first_name;
                    document.getElementById('lastName').value = camper.last_name;
                    document.getElementById('dateOfBirth').value = camper.date_of_birth;
                    document.getElementById('gender').value = camper.gender || '';
                    document.getElementById('groupId').value = camper.group_id || '';
                    document.getElementById('notes').value = camper.notes || '';
                    
                    this.populateSelects();
                    document.getElementById('camperModal').classList.add('active');
                } catch (error) {
                    Toast.error('Failed to load camper details');
                }
            },
            
            populateSelects() {
                // Populate groups
                const groupSelect = document.getElementById('groupId');
                groupSelect.innerHTML = '<option value="">Select group</option>' + 
                    this.groups.map(g => `<option value="${g.id}">${g.name}</option>`).join('');
                
                // Populate parents
                const parentSelect = document.getElementById('parentIds');
                parentSelect.innerHTML = this.parents.map(p => 
                    `<option value="${p.id}">${p.user?.full_name || 'Parent ' + p.id}</option>`
                ).join('');
            },
            
            async saveCamper() {
                const camperData = {
                    first_name: document.getElementById('firstName').value,
                    last_name: document.getElementById('lastName').value,
                    date_of_birth: document.getElementById('dateOfBirth').value,
                    gender: document.getElementById('gender').value || null,
                    group_id: document.getElementById('groupId').value || null,
                    notes: document.getElementById('notes').value || null
                };
                
                const id = document.getElementById('camperId').value;
                
                try {
                    if (id) {
                        await ApiService.campers.update(id, camperData);
                        Toast.success('Camper updated successfully');
                    } else {
                        await ApiService.campers.create(camperData);
                        Toast.success('Camper added successfully');
                    }
                    
                    this.closeModal();
                    await this.loadData();
                    this.render();
                } catch (error) {
                    Toast.error('Failed to save camper');
                }
            },
            
            closeModal() {
                document.getElementById('camperModal').classList.remove('active');
            },
            
            async deleteCamper(id) {
                if (!confirm('Are you sure you want to delete this camper?')) return;
                
                try {
                    await ApiService.campers.delete(id);
                    Toast.success('Camper deleted successfully');
                    await this.loadData();
                    this.render();
                } catch (error) {
                    Toast.error('Failed to delete camper');
                }
            },
            
            async suspendCamper(id) {
                try {
                    await ApiService.campers.suspend(id);
                    Toast.success('Camper suspended');
                    await this.loadData();
                    this.render();
                } catch (error) {
                    Toast.error('Failed to suspend camper');
                }
            },
            
            async activateCamper(id) {
                try {
                    await ApiService.campers.activate(id);
                    Toast.success('Camper activated');
                    await this.loadData();
                    this.render();
                } catch (error) {
                    Toast.error('Failed to activate camper');
                }
            },
            
            viewCamper(id) {
                // Navigate to camper details page
                window.location.href = `/pages/camper-details.html?id=${id}`;
            }
        };
        
        document.addEventListener('DOMContentLoaded', () => {
            Auth.init();
            CampersPage.init();
        });
    </script>
</body>
</html>
