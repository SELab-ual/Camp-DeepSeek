version: '3.8'

services:
  # 1. DATABASE
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-camp_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-SecureCamp2024!}
      POSTGRES_DB: ${POSTGRES_DB:-camp_management}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-camp_admin}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - camp-network

  # 2. BACKEND API (FastAPI)
  backend:
    build: ./backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-camp_admin}:${POSTGRES_PASSWORD:-SecureCamp2024!}@db:5432/${POSTGRES_DB:-camp_management}
      - SECRET_KEY=${SECRET_KEY:-09d25e094faa6ca2556c818166b7a9563b93f7099f6f0f4caa6cf63b88e8d3e7}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    networks:
      - camp-network

  # 3. FRONTEND (Nginx + Vue/Static)
  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - camp-network

volumes:
  pgdata:

networks:
  camp-network:
    driver: bridge